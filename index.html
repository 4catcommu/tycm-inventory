<style>
:root{
  --bg:#f4f1ea;
  --bg2:#e7e1d6;
  --card:#fffaf0;
  --card2:#f0e8d8;
  --ink:#111111;
  --ink2:#2a2a2a;
  --ink3:#66615a;
  --line:#151515;
  --line2:#3a342c;
  --paper:#fbf7ee;
  --paper2:#efe6d4;
  --gold:#b58a2a;
  --gold2:#d6ad47;
  --red:#9b1c1c;
  --green:#1f6b45;
  --text:#151515;
  --text2:#2f2f2f;
  --text3:#6d675f;
  --radius:10px;
  --radius-sm:6px;
  --font:'Sarabun',sans-serif;
  --font-head:'Kanit',sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  min-height:100vh;
  color:var(--text);
  font-family:var(--font);
  font-size:15px;
  background:
    linear-gradient(rgba(255,255,255,.86),rgba(255,255,255,.86)),
    repeating-linear-gradient(
      45deg,
      rgba(0,0,0,.035) 0px,
      rgba(0,0,0,.035) 1px,
      transparent 1px,
      transparent 9px
    ),
    radial-gradient(circle at 15% 5%,rgba(0,0,0,.10),transparent 28%),
    linear-gradient(180deg,#f8f4ea 0%,#e8dfcf 100%);
}

body:before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(circle at 20% 20%,rgba(0,0,0,.045),transparent 18%),
    radial-gradient(circle at 80% 70%,rgba(0,0,0,.035),transparent 22%);
  mix-blend-mode:multiply;
  opacity:.65;
}

.nav{
  position:sticky;
  top:0;
  z-index:100;
  display:flex;
  align-items:center;
  padding:0 24px;
  background:rgba(250,246,237,.96);
  border-bottom:3px double var(--line);
  box-shadow:0 8px 0 rgba(0,0,0,.06);
}

.nav-logo{
  font-family:var(--font-head);
  font-size:20px;
  font-weight:700;
  color:var(--ink);
  padding:15px 22px 15px 0;
  margin-right:12px;
  border-right:2px solid var(--line);
  white-space:nowrap;
  letter-spacing:.6px;
}

.nav-logo:before{
  content:"";
  display:inline-block;
  width:22px;
  height:22px;
  margin-right:8px;
  vertical-align:-5px;
  border:2px solid var(--ink);
  border-radius:50%;
  background:
    radial-gradient(circle at 50% 25%,#fff 0 9%,transparent 10%),
    radial-gradient(circle at 50% 75%,#111 0 9%,transparent 10%),
    linear-gradient(90deg,#111 0 50%,#fff 50% 100%);
}

.nav-tabs{
  display:flex;
  gap:6px;
  padding:8px 0;
  overflow-x:auto;
}

.nav-tab{
  padding:8px 18px;
  border-radius:0;
  cursor:pointer;
  font-size:14px;
  font-weight:600;
  color:var(--ink3);
  border:1px solid transparent;
  background:transparent;
  font-family:var(--font);
  white-space:nowrap;
}

.nav-tab:hover{
  color:var(--ink);
  border-color:var(--line);
  background:#fff;
}

.nav-tab.active{
  color:#fff;
  background:var(--ink);
  border-color:var(--ink);
  box-shadow:3px 3px 0 rgba(0,0,0,.18);
}

.sync-dot{
  width:9px;
  height:9px;
  border-radius:50%;
  background:var(--text3);
  margin-left:auto;
  margin-right:6px;
  flex-shrink:0;
  border:1px solid var(--ink);
}

.sync-dot.online{background:var(--green);}
.sync-dot.syncing{background:var(--gold);animation:pulse 1s infinite;}

@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}

.sync-label{
  font-size:12px;
  color:var(--ink3);
  white-space:nowrap;
}

.page{
  display:none;
  padding:30px 24px;
  max-width:1200px;
  margin:0 auto;
}

.page.active{display:block;}

.page-header{
  margin-bottom:24px;
  border-left:6px solid var(--ink);
  padding-left:14px;
}

.page-title{
  font-family:var(--font-head);
  font-size:25px;
  font-weight:700;
  color:var(--ink);
  margin-bottom:4px;
  letter-spacing:.4px;
}

.page-sub{
  font-size:13px;
  color:var(--text3);
}

.card{
  background:
    linear-gradient(180deg,rgba(255,255,255,.78),rgba(246,239,226,.92)),
    var(--paper);
  border:2px solid var(--line);
  border-radius:var(--radius);
  padding:20px;
  box-shadow:6px 6px 0 rgba(0,0,0,.14);
  position:relative;
}

.card:before{
  content:"";
  position:absolute;
  inset:6px;
  border:1px solid rgba(0,0,0,.16);
  pointer-events:none;
}

.overview-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:18px;
}

.player-card{
  background:var(--paper);
  border:2px solid var(--line);
  border-radius:var(--radius);
  overflow:hidden;
  box-shadow:5px 5px 0 rgba(0,0,0,.13);
}

.player-card:hover{
  transform:translate(-1px,-1px);
  box-shadow:7px 7px 0 rgba(0,0,0,.15);
}

.player-card-head{
  display:flex;
  align-items:center;
  gap:12px;
  padding:14px 16px;
  background:
    linear-gradient(90deg,#111 0,#111 7px,transparent 7px),
    linear-gradient(180deg,#fffaf0,#eadfc9);
  border-bottom:2px solid var(--line);
}

.player-avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:var(--font-head);
  font-weight:700;
  border:2px solid var(--line);
  flex-shrink:0;
  background:#fff;
  color:var(--ink);
}

.player-name-wrap{flex:1;min-width:0;}

.player-name{
  font-weight:700;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  color:var(--ink);
}

.player-stats,.player-row-meta{
  font-size:12px;
  color:var(--text3);
  margin-top:2px;
}

.bags-row{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:0;
  background:var(--line);
}

.bag-cell{
  background:var(--paper);
  padding:10px 8px;
  min-height:78px;
  border-right:1px solid var(--line);
}

.bag-cell:last-child{border-right:none;}

.bag-cell-label{
  font-size:10px;
  color:var(--ink);
  margin-bottom:5px;
  font-weight:700;
  letter-spacing:.5px;
}

.bag-item-chip{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:4px;
  font-size:11px;
  color:var(--text2);
}

.bag-item-chip .qty{
  background:var(--ink);
  color:#fff;
  padding:1px 6px;
  border-radius:0;
  font-size:10px;
  font-weight:700;
  white-space:nowrap;
}

.bag-empty{
  font-size:11px;
  color:var(--text3);
  font-style:italic;
}

.entry-layout{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:22px;
  align-items:start;
}

.form-title{
  font-family:var(--font-head);
  font-size:14px;
  font-weight:700;
  color:var(--ink);
  margin-bottom:14px;
  text-transform:uppercase;
  letter-spacing:1px;
  border-bottom:2px solid var(--ink);
  padding-bottom:8px;
}

.form-group{margin-bottom:14px;}

.form-label{
  display:block;
  font-size:12px;
  color:var(--ink3);
  margin-bottom:6px;
  font-weight:700;
}

.form-input,.form-select{
  width:100%;
  background:#fffdf7;
  border:2px solid var(--line);
  border-radius:var(--radius-sm);
  color:var(--ink);
  font-family:var(--font);
  font-size:14px;
  padding:10px 12px;
  outline:none;
}

.form-input:focus,.form-select:focus{
  border-color:var(--ink);
  box-shadow:3px 3px 0 rgba(0,0,0,.18);
  background:#fff;
}

.form-select{
  appearance:none;
  -webkit-appearance:none;
  cursor:pointer;
  background-image:
    linear-gradient(45deg,transparent 50%,#111 50%),
    linear-gradient(135deg,#111 50%,transparent 50%);
  background-position:
    calc(100% - 18px) 50%,
    calc(100% - 12px) 50%;
  background-size:6px 6px,6px 6px;
  background-repeat:no-repeat;
  padding-right:36px;
}

.form-select option{background:#fffdf7;color:#111;}

.btn{
  padding:11px 20px;
  border-radius:0;
  border:2px solid var(--line);
  cursor:pointer;
  font-family:var(--font);
  font-size:14px;
  font-weight:800;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  box-shadow:3px 3px 0 rgba(0,0,0,.18);
}

.btn:active{
  transform:translate(2px,2px);
  box-shadow:1px 1px 0 rgba(0,0,0,.18);
}

.btn-primary{
  width:100%;
  padding:13px;
  margin-top:4px;
  color:#fff;
  background:var(--ink);
}

.btn-primary:hover{background:#2a2a2a;}

.btn-ghost{
  background:#fffdf7;
  color:var(--ink);
  border:2px solid var(--line);
}

.btn-ghost:hover{background:#eee3ce;}

.btn-danger{
  background:#fffdf7;
  color:var(--red);
  border:2px solid var(--red);
}

.btn-danger:hover{
  background:#f3dddd;
}

.btn-sm{
  padding:6px 12px;
  font-size:12px;
}

.btn-gold{
  background:#fffdf7;
  color:var(--ink);
  border:2px solid var(--gold);
}

.preview-bag{
  background:#fffdf7;
  border:2px solid var(--line);
  border-radius:var(--radius-sm);
  padding:12px;
  min-height:100px;
}

.preview-bag-label{
  font-size:12px;
  color:var(--ink);
  font-weight:800;
  margin-bottom:8px;
}

.preview-item-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:7px 0;
  border-bottom:1px solid rgba(0,0,0,.18);
  font-size:13px;
  gap:10px;
}

.preview-item-row:last-child{border-bottom:none;}

.preview-item-row.highlight{
  color:var(--ink);
  font-weight:700;
}

.qty-pill{
  background:var(--ink);
  color:#fff;
  padding:2px 8px;
  border-radius:0;
  font-size:11px;
  font-weight:800;
  white-space:nowrap;
}

.players-list{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.player-row{
  display:flex;
  align-items:center;
  gap:12px;
  background:var(--paper);
  border:2px solid var(--line);
  border-radius:var(--radius);
  padding:12px 16px;
  box-shadow:4px 4px 0 rgba(0,0,0,.12);
}

.player-row-info{flex:1;}
.player-row-name{font-weight:800;font-size:15px;color:var(--ink);}
.player-row-actions{display:flex;gap:8px;}

.log-table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
  background:#fffdf7;
  border:2px solid var(--line);
}

.log-table th{
  text-align:left;
  padding:10px 12px;
  color:#fff;
  background:var(--ink);
  font-weight:800;
  font-size:12px;
  border-bottom:2px solid var(--line);
}

.log-table td{
  padding:9px 12px;
  border-bottom:1px solid rgba(0,0,0,.18);
  color:var(--text2);
}

.log-table tr:hover td{
  background:#f0e8d8;
}

.badge{
  display:inline-block;
  padding:2px 8px;
  border-radius:0;
  font-size:11px;
  font-weight:800;
  border:1px solid currentColor;
}

.badge-in{
  background:#e7f2eb;
  color:var(--green);
}

.badge-out{
  background:#f3dddd;
  color:var(--red);
}

.badge-clear{
  background:#eee3ce;
  color:var(--ink);
}

.toast{
  position:fixed;
  bottom:28px;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  background:#fffdf7;
  border:2px solid var(--line);
  border-radius:0;
  padding:10px 20px;
  font-size:13px;
  font-weight:700;
  color:var(--ink);
  opacity:0;
  pointer-events:none;
  transition:.2s;
  z-index:999;
  white-space:nowrap;
  box-shadow:5px 5px 0 rgba(0,0,0,.18);
}

.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

.toast.success{
  border-color:var(--green);
  color:var(--green);
}

.toast.error{
  border-color:var(--red);
  color:var(--red);
}

.modal-overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.64);
  z-index:200;
  align-items:center;
  justify-content:center;
}

.modal-overlay.open{display:flex;}

.modal{
  background:var(--paper);
  border:3px double var(--line);
  border-radius:var(--radius);
  padding:24px;
  width:360px;
  max-width:calc(100vw - 32px);
  box-shadow:8px 8px 0 rgba(0,0,0,.22);
}

.modal-title{
  font-family:var(--font-head);
  font-size:16px;
  font-weight:800;
  margin-bottom:16px;
  color:var(--ink);
  border-bottom:2px solid var(--line);
  padding-bottom:8px;
}

.modal-actions{
  display:flex;
  gap:10px;
  margin-top:18px;
}

.modal-actions .btn{flex:1;}

.empty-state{
  text-align:center;
  padding:48px 20px;
  color:var(--text3);
}

.empty-state .icon{
  font-size:40px;
  margin-bottom:12px;
}

.divider{
  height:2px;
  background:var(--line);
  margin:18px 0;
  opacity:.22;
}

.loading{
  display:flex;
  align-items:center;
  justify-content:center;
  padding:60px;
  color:var(--text3);
  font-size:14px;
  gap:10px;
}

.spinner{
  width:20px;
  height:20px;
  border:2px solid rgba(0,0,0,.18);
  border-top-color:var(--ink);
  border-radius:50%;
  animation:spin .8s linear infinite;
}

@keyframes spin{to{transform:rotate(360deg);}}

.av0,.av1,.av2,.av3,.av4,.av5,.av6,.av7{
  background:#fffdf7;
  color:#111;
}

@media(max-width:720px){
  .entry-layout{grid-template-columns:1fr;}
  .nav{padding:0 12px;overflow-x:auto;}
  .nav-logo{font-size:17px;}
  .nav-tab{padding:8px 12px;}
  .sync-label{display:none;}
  .overview-grid{grid-template-columns:1fr;}
  .bags-row{grid-template-columns:repeat(5,minmax(68px,1fr));overflow-x:auto;}
}
</style>
